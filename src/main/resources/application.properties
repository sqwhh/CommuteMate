spring.application.name=CommuteMate

server.port=${PORT:8080}

# Disable template caching so HTML/CSS edits show up without a restart during development
spring.thymeleaf.cache=false

# Epic 1: user accounts stored in a file-based H2 database
spring.datasource.url=jdbc:h2:file:./data/commutemate
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# SFU's local time zone.
app.time-zone=${APP_TIME_ZONE:America/Vancouver}

# for demoй
app.seed-demo-data=${SEED_DEMO_DATA:true}

# epic2: Open-Meteo is a third party, so never let a slow response hold a dashboard
# request thread open. These only apply to the auto-configured RestClient.Builder,
# which is why WeatherService must not use RestClient.create().
spring.http.client.connect-timeout=2s
spring.http.client.read-timeout=3s

# epic2: cache the current weather so dashboard reloads don't call the API every time.
# Open-Meteo only refreshes its model output every ~15 minutes anyway.
spring.cache.cache-names=weather
spring.cache.caffeine.spec=expireAfterWrite=10m
