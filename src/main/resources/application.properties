spring.application.name=CommuteMate

server.port=${PORT:8080}

# Disable template caching so HTML/CSS edits show up without a restart during development
spring.thymeleaf.cache=false

# Epic 1: user accounts stored in a file-based H2 database
spring.datasource.url=jdbc:h2:file:./data/commutemate
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# SFU's local time zone.
app.time-zone=${APP_TIME_ZONE:America/Vancouver}

# for demo
app.seed-demo-data=${SEED_DEMO_DATA:false}
