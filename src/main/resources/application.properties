spring.application.name=CommuteMate

server.port=${PORT:8080}

# Disable template caching so HTML/CSS edits show up without a restart during development
spring.thymeleaf.cache=false

# Epic 1: user accounts stored in a file-based H2 database
spring.datasource.url=jdbc:h2:file:./data/commutemate
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# SFU's local time zone.
app.time-zone=${APP_TIME_ZONE:America/Vancouver}


# for demo
app.seed-demo-data=${SEED_DEMO_DATA:true}

#epic2: TransLink real-time transit API key
# (set TRANSLINK_API_KEY locally and in Render's environment settings; never commit the key)
translink.api.key=${TRANSLINK_API_KEY:}
# epic2: GTFS stop_ids whose upcoming departures we show, comma-separated. These are the
# four SFU Transit Exchange bays (stop_codes 51861, 53096, 52807 and 60662 on the signs).
# NOTE: GTFS-realtime keys off stop_id, which is NOT the number printed on the stop sign —
# look the id up in stops.txt of https://gtfs-static.translink.ca/gtfs/google_transit.zip.
translink.stop-ids=${TRANSLINK_STOP_IDS:1875,3129,2836,12972}
# epic2: human-friendly name for those stops, shown on the transit card so riders know
# where these departures leave from.
translink.stop-name=${TRANSLINK_STOP_NAME:SFU Transit Exchange}

# epic2: TransLink and Open-Meteo are third parties, so never let a slow response hold a
# dashboard request thread open. Without these a hung connection never throws and the page
# just stops loading instead of showing the "temporarily unavailable" / missing card. These
# only apply to the auto-configured RestClient.Builder, which is why the services must not
# use RestClient.create(). The rider dashboard makes several calls in sequence, so worst
# case adds connect+read per call before the cards fall back.
spring.http.client.connect-timeout=2s
spring.http.client.read-timeout=3s

# epic2: cache the current weather so dashboard reloads don't call the API every time.
# Open-Meteo only refreshes its model output every ~15 minutes anyway.
spring.cache.cache-names=weather
spring.cache.caffeine.spec=expireAfterWrite=10m
