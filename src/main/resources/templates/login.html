<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log in - CommuteMate</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", sans-serif; background: linear-gradient(135deg, #6e8efb, #a777e3); min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; width: 320px; }
        h1 { font-size: 1.5rem; margin-top: 0; }
        label { display: block; margin-top: 1rem; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        button { margin-top: 1.5rem; width: 100%; padding: 0.6rem; background: #6e8efb; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        .message { padding: 0.5rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1rem; }
        .error-msg { background: #fdecea; color: #c0392b; }
        .success-msg { background: #eafaf1; color: #27ae60; }
        a { color: #6e8efb; }
    </style>
</head>
<body>
<div class="card">
    <h1>Log in to CommuteMate</h1>

    <p class="message success-msg" th:if="${param.registered != null}">Account created! You can now log in.</p>
    <p class="message success-msg" th:if="${param.loggedout != null}">You've been logged out.</p>
    <p class="message error-msg" th:if="${param.error != null}">Invalid email or password.</p>

    <form th:action="@{/login}" method="post">
        <label>Email</label>
        <input type="email" name="email" required />

        <label>Password</label>
        <input type="password" name="password" required />

        <button type="submit">Log in</button>
    </form>

    <p>Don't have an account? <a th:href="@{/register}">Register</a></p>
</div>
</body>
</html>
