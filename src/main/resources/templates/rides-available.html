<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Available rides — CommuteMate',
  'Browse SFU student rides heading up Burnaby Mountain.')}"></head>
<body>
<div class="min-h-screen bg-background">

  <header th:replace="~{fragments/layout :: nav('available')}"></header>

  <main class="mx-auto max-w-7xl px-6 py-10">
    <div class="flex flex-wrap items-end justify-between gap-4">
      <div>
        <p class="text-sm font-medium text-primary">Available rides</p>
        <h1 class="mt-1 font-display text-3xl font-semibold tracking-tight md:text-4xl">
          <span data-rides-count="data-rides-count" th:text="${#lists.size(rides)}">4</span> rides heading up the mountain
        </h1>
        <p class="mt-1.5 text-sm text-muted-foreground">
          Verified SFU drivers · departures in the next 2 hours
        </p>
      </div>
    </div>

    <!-- Search + sort toolbar. Works without JS by submitting to the server. -->
    <form method="get" th:action="@{/rides/available}"
          class="mt-8 flex flex-wrap items-center gap-3 rounded-2xl border border-border bg-card p-3 card-lift">
      <div class="relative flex-1 min-w-[240px]">
        <svg class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34" /><circle cx="11" cy="11" r="8" /></svg>
        <input type="text" name="q" th:value="${query}" data-rides-search="data-rides-search"
               placeholder="Search by pickup, destination, or driver"
               class="flex h-9 w-full rounded-md border border-input bg-transparent pl-9 pr-3 py-1 text-base shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 md:text-sm" />
      </div>
      <div class="flex items-center gap-1.5 text-xs text-muted-foreground">
        <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z" /></svg> Sort by
      </div>
      <div class="flex flex-wrap gap-1.5">
        <button type="submit" class="rounded-full px-3 py-1.5 text-xs font-medium transition-colors" name="sort"
                th:each="s : ${sortOptions}" th:value="${s}" th:text="${s}" th:attr="data-sort=${s}"
                th:classappend="${sort == s} ? 'bg-primary text-primary-foreground' : 'bg-secondary hover:bg-secondary/70'">Departure</button>
      </div>
    </form>

    <div class="mt-6 grid gap-4 md:grid-cols-2" data-rides-grid="data-rides-grid">
      <article th:each="r : ${rides}" class="rounded-2xl border border-border bg-card p-5 card-lift hover:card-lift-hover"
               data-ride="data-ride"
               th:attr="data-search=${#strings.toLowerCase(r.from + ' ' + r.to + ' ' + r.driver)},
                        data-depart=${r.departAt},
                        data-price=${r.price},
                        data-eco=${r.ecoScore},
                        data-rating=${r.rating}">
        <div class="flex items-start justify-between gap-3">
          <div class="flex items-center gap-3">
            <div class="grid h-11 w-11 place-items-center rounded-full bg-primary text-primary-foreground text-sm font-semibold"
                 th:text="${r.driverInitials}">PS</div>
            <div>
              <p class="font-semibold" th:text="${r.driver}">Priya S.</p>
              <div class="flex items-center gap-1 text-xs text-muted-foreground">
                <svg class="h-3 w-3 fill-primary text-primary" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" /></svg>
                <span th:text="${#numbers.formatDecimal(r.rating, 1, 1)} + ' · ' + ${r.car}">4.9 · Toyota Corolla · Silver</span>
              </div>
            </div>
          </div>
          <th:block th:switch="${r.seatsLeft}">
            <span th:case="0" class="rounded-full px-2.5 py-1 text-xs font-medium bg-muted text-muted-foreground">Full</span>
            <span th:case="1" class="rounded-full px-2.5 py-1 text-xs font-medium bg-amber-500/10 text-amber-800">1 seat left</span>
            <span th:case="*" class="rounded-full px-2.5 py-1 text-xs font-medium bg-emerald-500/10 text-emerald-800"
                  th:text="${r.seatsLeft} + ' seats left'">2 seats left</span>
          </th:block>
        </div>

        <div class="mt-4 space-y-2">
          <div class="flex items-center gap-2 text-sm">
            <svg class="h-4 w-4 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0" /><circle cx="12" cy="10" r="3" /></svg>
            <span class="text-muted-foreground">From</span>
            <span class="font-medium" th:text="${r.from}">Metrotown Station</span>
          </div>
          <div class="flex items-center gap-2 text-sm">
            <svg class="h-4 w-4 text-primary" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0" /><circle cx="12" cy="10" r="3" /></svg>
            <span class="text-muted-foreground">To</span>
            <span class="font-medium" th:text="${r.to}">SFU Burnaby — AQ</span>
          </div>
        </div>

        <p th:if="${r.notes}" class="mt-3 rounded-lg bg-secondary/60 px-3 py-2 text-xs text-muted-foreground"
           th:text="'“' + ${r.notes} + '”'">“Leaving from Kiss &amp; Ride, quiet drive.”</p>

        <div class="mt-4 flex flex-wrap items-center gap-2 border-t border-border pt-4">
          <span class="inline-flex items-center gap-1 rounded-full bg-secondary px-2.5 py-1 text-xs font-medium">
            <svg class="h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></svg> <span th:text="${r.departTime}">8:15 AM</span>
          </span>
          <span class="inline-flex items-center gap-1 rounded-full bg-secondary px-2.5 py-1 text-xs font-medium">
            <svg class="h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="2" y2="22" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></svg> <span th:text="${r.price}">4</span>
          </span>
          <span class="inline-flex items-center gap-1 rounded-full bg-primary/10 px-2.5 py-1 text-xs font-medium text-primary">
            <svg class="h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z" /><path d="M20 2v4" /><path d="M22 4h-4" /><circle cx="4" cy="20" r="2" /></svg> <span th:text="'+' + ${r.points} + ' pts'">+25 pts</span>
          </span>
          <span class="inline-flex items-center gap-1 rounded-full bg-emerald-500/10 px-2.5 py-1 text-xs font-medium text-emerald-800">
            <svg class="h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" /><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12" /></svg> <span th:text="'Eco ' + ${r.ecoScore}">Eco 82</span>
          </span>
          <span class="inline-flex items-center gap-1 rounded-full bg-secondary px-2.5 py-1 text-xs font-medium">
            <svg class="h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><path d="M16 3.128a4 4 0 0 1 0 7.744" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><circle cx="9" cy="7" r="4" /></svg> <span th:text="${r.seats}">4</span>
          </span>
          <button th:disabled="${r.full}"
                  class="ml-auto inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md font-medium cursor-pointer transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 disabled:cursor-not-allowed [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0 text-xs bg-primary text-primary-foreground shadow hover:bg-primary/90 h-8 px-3"
                  th:text="${r.full} ? 'Waitlist' : 'Request seat'">Request seat</button>
        </div>
      </article>
    </div>
  </main>
</div>
</body>
</html>
