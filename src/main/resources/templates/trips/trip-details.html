<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trip Details</title>
</head>
<body>
    <h1>Trip Details</h1>

    <p>
        <strong>ID:</strong>
        <span th:text="${trip.id}"></span>
    </p>

    <p>
        <strong>Start Location:</strong>
        <span th:text="${trip.startLocation}"></span>
    </p>

    <p>
        <strong>Destination:</strong>
        <span th:text="${trip.destination}"></span>
    </p>

    <p>
        <strong>Departure Time:</strong>
        <span th:text="${trip.formattedDepartureTime}"></span>
    </p>

    <p>
        <strong>Seats Available:</strong>
        <span th:text="${trip.seatsAvailable}"></span>
    </p>

    <p>
        <strong>Status:</strong>
        <span th:text="${trip.status}"></span>
    </p>

    <form th:action="@{/trips/{id}/confirm(id=${trip.id})}" method="post">
        <button type="submit">Confirm Trip</button>
    </form>

    <br>

    <form th:action="@{/trips/{id}/cancel(id=${trip.id})}" method="post">
        <button type="submit">Cancel Trip</button>
    </form>
    <br>
    <a href="/trips/my">Back to My Trips</a>
</body>
</html>
