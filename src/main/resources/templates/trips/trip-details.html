<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trip Details</title>
</head>
<body>
    <h1>Trip Details</h1>

    <p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></p>
    <p th:if="${successMessage}" th:text="${successMessage}" style="color: green;"></p>

    <p>
        <strong>ID:</strong>
        <span th:text="${trip.id}"></span>
    </p>

    <p>
        <strong>Driver ID:</strong>
        <span th:text="${trip.driverId}"></span>
    </p>

    <p>
        <strong>Start Location:</strong>
        <span th:text="${trip.startLocation}"></span>
    </p>

    <p>
        <strong>Destination:</strong>
        <span th:text="${trip.destination}"></span>
    </p>

    <p>
        <strong>Departure Time:</strong>
        <span th:text="${trip.formattedDepartureTime}"></span>
    </p>

    <p>
        <strong>Seats Available:</strong>
        <span th:text="${trip.seatsAvailable}"></span>
    </p>

    <p>
        <strong>Status:</strong>
        <span th:text="${trip.status}"></span>
    </p>

    <p>
        <strong>Riders:</strong>
        <span th:if="${#lists.isEmpty(trip.riderIds)}">No riders yet</span>
        <span th:if="${!#lists.isEmpty(trip.riderIds)}" th:text="${trip.riderIds}"></span>
    </p>

    <hr>

    <h2>Join this trip</h2>
    <form th:if="${trip.status.name() != 'COMPLETED' and trip.status.name() != 'CANCELLED' and trip.seatsAvailable > 0}"
          th:action="@{/trips/{id}/join(id=${trip.id})}"
          method="post">
        <label for="riderId">Rider ID:</label>
        <input type="text" id="riderId" name="riderId" placeholder="Example: rider1" required>
        <button type="submit">Join Trip</button>
    </form>

    <p th:if="${trip.status.name() == 'COMPLETED'}">This trip is already completed.</p>
    <p th:if="${trip.status.name() == 'CANCELLED'}">This trip is cancelled.</p>
    <p th:if="${trip.status.name() != 'COMPLETED' and trip.status.name() != 'CANCELLED' and trip.seatsAvailable == 0}">
        No seats available.
    </p>

    <hr>

    <h2>Driver actions</h2>
    <form th:if="${trip.status.name() == 'CREATED'}"
          th:action="@{/trips/{id}/confirm(id=${trip.id})}"
          method="post">
        <button type="submit">Confirm Trip</button>
    </form>

    <br th:if="${trip.status.name() == 'CREATED'}">

    <form th:if="${trip.status.name() == 'CONFIRMED'}"
          th:action="@{/trips/{id}/complete(id=${trip.id})}"
          method="post">
        <button type="submit">Complete Trip</button>
    </form>

    <br th:if="${trip.status.name() == 'CONFIRMED'}">

    <form th:if="${trip.status.name() != 'COMPLETED' and trip.status.name() != 'CANCELLED'}"
          th:action="@{/trips/{id}/cancel(id=${trip.id})}"
          method="post">
        <button type="submit">Cancel Trip</button>
    </form>

    <br>
    <p>
        <a href="/trips/my">Back to Trips</a>
    </p>
</body>
</html>
