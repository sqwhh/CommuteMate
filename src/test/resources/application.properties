spring.application.name=CommuteMate

# Tests are now run in specific test db file
spring.datasource.url=jdbc:h2:mem:commutemate-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Builds and removes files for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.time-zone=America/Vancouver
app.seed-demo-data=false

# Epic 2: this file shadows src/main/resources/application.properties during tests, so the
# TransLink placeholders have to be defined here too or the context fails to start. Dummy
# values are fine: no test hits the real API.
translink.api.key=test-key
